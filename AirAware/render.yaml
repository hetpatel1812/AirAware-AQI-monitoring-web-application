services:
  - type: web
    name: airaware
    rootDir: Airaware
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "wsgi:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: WEATHER_API_KEY
        sync: false
      - key: NEWSDATA_API_KEY
        sync: false
      - key: CPCB_API_KEY
        sync: false
