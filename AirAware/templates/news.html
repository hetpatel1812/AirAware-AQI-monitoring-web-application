<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Latest Air Quality News from India - AirAware">
    <title>AQI News | AirAware</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/images/favicon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,0,0" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .news-section {
            padding-top: 100px;
            padding-bottom: 60px;
            min-height: 100vh;
        }

        .news-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--spacing-xl);
        }

        .section-header {
            margin-bottom: var(--spacing-2xl);
            text-align: center;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: var(--spacing-xl);
        }

        .news-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: var(--transition-normal);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent-primary);
        }

        .news-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: var(--bg-secondary);
        }

        .news-content {
            padding: var(--spacing-lg);
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .news-source {
            font-size: 0.85rem;
            color: var(--accent-primary);
            font-weight: 600;
            margin-bottom: var(--spacing-xs);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .news-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: var(--spacing-md);
            line-height: 1.4;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-date {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: var(--spacing-md);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .news-description {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-lg);
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-action {
            margin-top: auto;
        }

        .read-more-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            text-decoration: none;
            border-radius: var(--radius-full);
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition-fast);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .read-more-btn:hover {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        /* Loading State */
        .loading-container {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-2xl);
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: var(--spacing-md);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .news-grid {
                grid-template-columns: 1fr;
            }
            .section-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <img src="{{ url_for('static', filename='images/airaware_logo.png') }}" alt="AirAware Logo" class="logo-icon">
                <span class="logo-text">Air<span class="logo-highlight">Aware</span></span>
            </a>
            
            <div class="nav-links">
                <a href="/" class="nav-link">Dashboard</a>
                <a href="/maps" class="nav-link">Map</a>
                <a href="/news" class="nav-link active">News</a>
                <a href="/about" class="nav-link">About</a>
                <a href="/contact" class="nav-link">Support</a>
            </div>
        </div>
    </nav>

    <section class="news-section">
        <div class="news-container">
            <header class="section-header">
                <h1 class="section-title">Air Quality News</h1>
                <p class="section-subtitle">Latest updates and stories about air pollution in India</p>
            </header>

            <div id="newsGrid" class="news-grid">
                <div class="loading-container">
                    <div class="spinner"></div>
                    <p>Fetching latest news...</p>
                </div>
            </div>
        </div>
    </section>

    <script src="{{ url_for('static', filename='js/news.js') }}"></script>
</body>
</html>
